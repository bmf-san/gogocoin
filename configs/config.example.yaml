# gogocoin Configuration Example
# Copy to config.yaml and set environment variables:
#   export BITFLYER_API_KEY="your_key"
#   export BITFLYER_API_SECRET="your_secret"

app:
  name: "gogocoin"

api:
  endpoint: "https://api.bitflyer.com"
  websocket_endpoint: "wss://ws.lightstream.bitflyer.com/json-rpc"
  credentials:
    api_key: ${BITFLYER_API_KEY}
    api_secret: ${BITFLYER_API_SECRET}
  timeout: 30s
  retry_count: 3
  rate_limit:
    requests_per_minute: 50

trading:
  initial_balance: 1000
  fee_rate: 0.0015
  symbols:
    - "XRP_JPY"  # Recommended for low-budget trading (min 1 XRP)
  strategy:
    name: "scalping"
  risk_management:
    max_total_loss_percent: 50.0
    max_trade_loss_percent: 10.0
    max_daily_loss_percent: 30.0
    max_trade_amount_percent: 80.0
    max_daily_trades: 100
    min_trade_interval: 60s
    # Note: profit/loss targets are in strategy_params.scalping

# Scalping Strategy
# EMA-based scalping with configurable trade frequency
strategy_params:
  scalping:
    ema_fast_period: 9        # Fast EMA period (9 bars)
    ema_slow_period: 21       # Slow EMA period (21 bars)
    take_profit_pct: 2.0      # 2% profit target
    stop_loss_pct: 1.0        # 1% stop loss
    cooldown_sec: 90          # 90 sec cooldown between trades
    max_daily_trades: 3       # Max 3 trades per day (conservative)
    min_notional: 200         # Minimum 200 JPY per trade
    fee_rate: 0.001           # 0.1% trading fee

data:
  market_data:
    history_days: 365

ui:
  host: "0.0.0.0"
  port: 8080

logging:
  level: "info"
  format: "json"
  output: "both"
  file_path: "./logs/gogocoin.log"
  max_size_mb: 50
  max_backups: 3
  max_age_days: 7
  categories:
    trading: "debug"
    api: "info"
    strategy: "debug"
    ui: "info"

# Data retention: 1 = today only, 7 = last 7 days
data_retention:
  retention_days: 1
