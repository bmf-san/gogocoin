# =============================================================================
# gogocoin 設定ファイル例
# =============================================================================
# 本番使用前に config.yaml としてコピーし、適切な値を設定してください
#
# 使用方法:
#   1. cp configs/config.example.yaml configs/config.yaml
#   2. 環境変数を設定: export BITFLYER_API_KEY="your_api_key"
#   3. 必要に応じて各パラメータを調整
# =============================================================================

# アプリケーション基本設定
app:
  name: "gogocoin"                    # アプリケーション名（変更不要）

# bitFlyer API設定
api:
  endpoint: "https://api.bitflyer.com"                              # bitFlyer REST API エンドポイント
  websocket_endpoint: "wss://ws.lightstream.bitflyer.com/json-rpc" # bitFlyer WebSocket エンドポイント

  # API認証情報（必須：ライブ取引時）
  # 環境変数を事前に設定してください:
  #   export BITFLYER_API_KEY="your_api_key_here"
  #   export BITFLYER_API_SECRET="your_api_secret_here"
  credentials:
    api_key: ${BITFLYER_API_KEY}        # 環境変数から取得（bitFlyerで発行）
    api_secret: ${BITFLYER_API_SECRET}  # 環境変数から取得（bitFlyerで発行）

  # API接続設定
  timeout: 30s                      # API呼び出しタイムアウト（秒）
  retry_count: 3                    # API失敗時のリトライ回数
  rate_limit:
    requests_per_minute: 500        # 1分間あたりの最大リクエスト数（bitFlyer制限内）
  # 注意: Web UI機能は常に有効です（投資システムの基本機能）
  port: 8080                        # Web API サーバーのポート番号

# =============================================================================
# 取引設定（最重要設定項目）
# =============================================================================
trading:
  # 基本設定
  # 注意: 取引モード（paper/live）はコマンドライン引数で指定します
  #       例: ./bin/gogocoin -mode paper
  initial_balance: 1000              # ペーパートレード用初期残高（円）※少額から開始
  fee_rate: 0.0015                   # ペーパーモード専用手数料率（ライブモードはAPI自動取得）

  # 対象通貨ペア（bitFlyer対応ペア）
  symbols:
    - "BTC_JPY"                      # ビットコイン/日本円（推奨：流動性高）
    - "ETH_JPY"                      # イーサリアム/日本円
    - "XRP_JPY"                      # リップル/日本円
    - "XLM_JPY"                      # ステラルーメン/日本円
    - "MONA_JPY"                     # モナコイン/日本円

  # 戦略設定
  strategy:
    name: "scalping"                 # 使用する戦略: scalping のみ

  # =============================================================================
  # リスク管理設定（重要：損失を制限）
  # =============================================================================
  risk_management:
    # 損失制限（パーセント）
    max_total_loss_percent: 50.0    # 総資産に対する最大損失率（50%で全停止）※少額なので高めに設定
    max_trade_loss_percent: 10.0    # 1取引あたりの最大損失率（10%で損切り）
    max_daily_loss_percent: 30.0    # 1日あたりの最大損失率（30%で当日停止）

    # 取引制限
    max_trade_amount_percent: 80.0  # 1取引あたりの最大資金使用率（80%まで）※少額なので高めに設定
    max_daily_trades: 100           # 1日の最大取引回数（テスト用に多めに設定）
    min_trade_interval: 30s         # 連続取引の最小間隔（30秒間隔）※テスト用に短縮

    # 自動利確・損切り設定
    stop_loss_percent: 5.0          # 個別取引の損切りライン（5%下落で損切り）
    take_profit_percent: 5.0        # 個別取引の利確ライン（5%上昇で利確）

# =============================================================================
# 戦略固有パラメータ（最小限ステートレス・スキャルピング v2.0）
# =============================================================================
strategy_params:
  # スキャルピング戦略パラメータ（EMAベース・ステートレス・200-300円対応）
  scalping:
    ema_fast_period: 9              # 短期EMA期間（9バー）
    ema_slow_period: 21             # 中期EMA期間（21バー）
    take_profit_pct: 0.8            # 利確率（%）※エントリーから+0.8%で利確
    stop_loss_pct: 0.4              # 損切率（%）※エントリーから-0.4%で損切
    cooldown_sec: 90                # クールダウン時間（秒）※取引後90秒待機
    max_daily_trades: 3             # 1日最大取引回数（3回まで）※手数料負け防止
    min_notional: 200               # 最小注文金額（JPY）※200円から対応
    fee_rate: 0.001                 # 取引手数料率（0.1%）※bitFlyer想定

# =============================================================================
# データ管理設定
# =============================================================================
data:
  # リアルタイム市場データ設定
  market_data:
    # 注意: 履歴データ保存は常に有効です（パフォーマンス分析に必要）
    history_days: 365               # 履歴データ保持日数（1年）

# =============================================================================
# Web UI設定
# =============================================================================
ui:
  host: "localhost"                 # バインドアドレス（0.0.0.0=外部アクセス許可）
  port: 8080                        # Webサーバーポート番号

# =============================================================================
# ログ設定
# =============================================================================
logging:
  level: "info"                     # 全体ログレベル: debug, info, warn, error
  format: "json"                    # ログ形式: json（構造化）, text（読みやすい）
  output: "file"                    # 出力先: console（標準出力）, file（ファイル）, both（両方）
  file_path: "./logs/gogocoin.log"  # ログファイルパス
  max_size_mb: 100                  # ログファイル最大サイズ（MB）
  max_backups: 5                    # ローテーション保持ファイル数
  max_age_days: 30                  # ログファイル保持日数

  # カテゴリ別ログレベル設定（詳細制御）
  categories:
    trading: "debug"                # 取引関連（重要：詳細ログ推奨）
    api: "info"                     # API通信関連
    strategy: "debug"               # 戦略実行関連（重要：詳細ログ推奨）
    ui: "info"                      # Web UI関連

# =============================================================================
# 設定使用例・推奨設定
# =============================================================================
#
# 初心者向け推奨設定:
# - ./bin/gogocoin -mode paper (仮想取引で練習)
# - initial_balance: 1000 (少額から開始)※現在の設定
# - max_trade_amount_percent: 80.0 (少額なので高めに設定)
# - strategy: "simple_test" (テスト用戦略)
#
# 上級者向け設定:
# - ./bin/gogocoin -mode live (実取引、十分な検証後)
# - 複数通貨ペア対応
# - カスタム戦略パラメータ調整
# - 詳細なリスク管理設定
#
# トラブルシューティング:
# - logging.level: "debug" (詳細ログ)
# - categories.trading: "debug" (取引ログ詳細化)
#
# =============================================================================
