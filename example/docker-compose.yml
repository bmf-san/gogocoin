version: '3.8'

services:
  gogocoin:
    build:
      context: ..
      dockerfile: example/Dockerfile
    container_name: gogocoin
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./configs:/app/configs
    environment:
      - TZ=Asia/Tokyo
      - BITFLYER_API_KEY=${BITFLYER_API_KEY:-}
      - BITFLYER_API_SECRET=${BITFLYER_API_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
