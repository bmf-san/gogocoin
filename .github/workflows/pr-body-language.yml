name: PR Body Language Check

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  check:
    name: Ensure PR body is in English
    runs-on: ubuntu-latest
    steps:
      - name: Reject Japanese characters in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body || '';
            // Hiragana / Katakana / CJK Unified Ideographs
            const jp = /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF]/;
            if (jp.test(body)) {
              core.setFailed(
                'PR body contains Japanese characters. ' +
                'Please write the pull request body in English.'
              );
            } else {
              core.info('PR body language check passed.');
            }
