name: CI

on:
  push:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run tests (race + shuffle)
      run: go test -race -shuffle=on ./...

    - name: Generate coverage report
      run: go test -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Verify go.mod is tidy
      run: |
        go mod tidy
        git diff --exit-code -- go.mod go.sum

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m

  codegen:
    name: OpenAPI Codegen Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Install oapi-codegen
      run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

    - name: Check generated code is up-to-date
      run: make generate-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint, codegen]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Build library packages
      run: go build ./pkg/... ./internal/...

    - name: Build example
      working-directory: example
      run: |
        go mod tidy
        go build -o /dev/null ./cmd/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Install Gosec
      run: go install github.com/securego/gosec/v2/cmd/gosec@latest

    - name: Run Gosec Security Scanner
      # HIGH severity / HIGH confidence のみで fail。MEDIUM/LOW は SARIF 経由で
      # Security タブに集約する。example/ は別 Go モジュール (example/go.mod)
      # のため除外。go install でバージョンを固定 (ghcr.io の 2.25 は golang-errors
      # で誤 fail する挙動差があった)。
      run: gosec -severity high -confidence high -exclude-dir=example -fmt sarif -out results.sarif ./...

    - name: Upload SARIF file
      if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image (test only)
      uses: docker/build-push-action@v7
      with:
        context: .
        file: example/Dockerfile
        platforms: linux/amd64
        push: false
        tags: gogocoin:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
