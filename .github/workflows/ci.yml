name: CI

on:
  push:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run tests (race + shuffle)
      run: go test -race -shuffle=on ./...

    - name: Generate coverage report
      run: go test -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Verify go.mod is tidy
      run: |
        go mod tidy
        git diff --exit-code -- go.mod go.sum

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m

  codegen:
    name: OpenAPI Codegen Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Install oapi-codegen
      run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

    - name: Check generated code is up-to-date
      run: make generate-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint, codegen]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Build library packages
      run: go build ./pkg/... ./internal/...

    - name: Build example
      working-directory: example
      run: |
        go mod tidy
        go build -o /dev/null ./cmd/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Install Gosec
      run: go install github.com/securego/gosec/v2/cmd/gosec@latest

    - name: Run Gosec Security Scanner
      # HIGH severity / HIGH confidence のみを対象。MEDIUM/LOW は SARIF 経由で
      # Security タブに集約。example/ は別 Go モジュール (example/go.mod) のため除外。
      # -no-fail でツール自身の exit code に依存せず、SARIF の results 数で判定
      # (gosec は golang-errors 等 "issue 以外" でも exit 1 になるケースがある)。
      # G703 (path traversal via taint) 除外: HTTP API は request からファイルパスを
      #   一切受け取らず、全ファイル I/O は起動時 config 由来のパスのみ使用。
      run: |
        gosec -severity high -confidence high \
              -exclude-dir=example -exclude=G703 -no-fail \
              -fmt sarif -out results.sarif ./...
        echo "=== SARIF results summary ==="
        jq '[.runs[].results] | flatten | length' results.sarif

    - name: Fail if HIGH/HIGH issues found
      run: |
        count=$(jq '[.runs[].results] | flatten | length' results.sarif)
        if [ "$count" -gt 0 ]; then
          echo "::error::gosec found $count HIGH severity / HIGH confidence issue(s)"
          jq '.runs[].results' results.sarif
          exit 1
        fi

    - name: Upload SARIF file
      if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image (test only)
      uses: docker/build-push-action@v7
      with:
        context: .
        file: example/Dockerfile
        platforms: linux/amd64
        push: false
        tags: gogocoin:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
