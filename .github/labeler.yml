# Configuration for actions/labeler
# Automatically applies labels to pull requests based on changed file paths.
# Note: `dependencies` is intentionally omitted here because Dependabot attaches it directly.

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - "**/*.md"
          - README*
          - LICENSE

github_actions:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**

go:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.go"

config:
  - changed-files:
      - all-globs-to-any-file:
          - "!.github/**"
      - any-glob-to-any-file:
          - configs/**

web:
  - changed-files:
      - any-glob-to-any-file:
          - web/**

engine:
  - changed-files:
      - any-glob-to-any-file:
          - pkg/engine/**

strategy:
  - changed-files:
      - any-glob-to-any-file:
          - pkg/strategy/**
          - example/strategy/**

example:
  - changed-files:
      - any-glob-to-any-file:
          - example/**
