# Configuration for actions/labeler
# Automatically applies labels to pull requests based on changed file paths.
# Note: `dependencies` is intentionally omitted here because Dependabot attaches it directly.

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - "**/*.md"
          - README*
          - LICENSE

github_actions:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**

test:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*_test.go"

config:
  - changed-files:
      - any-glob-to-any-file:
          - configs/**
          - internal/config/**

web:
  - changed-files:
      - any-glob-to-any-file:
          - web/**
          - internal/adapter/http/**

engine:
  - changed-files:
      - any-glob-to-any-file:
          - pkg/engine/**

strategy:
  - changed-files:
      - any-glob-to-any-file:
          - pkg/strategy/**
          - example/strategy/**

example:
  - changed-files:
      - any-glob-to-any-file:
          - example/**

core:
  - changed-files:
      - any-glob-to-any-file:
          - internal/domain/**
          - internal/usecase/**
          - internal/infra/**
          - internal/adapter/worker/**
