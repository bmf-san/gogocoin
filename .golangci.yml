version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - misspell
    - gocritic
  settings:
    misspell:
      locale: US
      ignore-words:
        - strat      # short for "strategy" throughout the codebase
    gocritic:
      enabled-checks:
        - hugeParam
        - rangeValCopy
        - nilValReturn
  exclusions:
    paths:
      - ".*_mock\\.go"
      - ".*\\.pb\\.go"
      - "testdata/.*"
    rules:
      - path: "_test\\.go"
        linters: [gocritic, errcheck]  # test files: gocritic & errcheck suppressed
      - path: "_test\\.go"
        linters: [staticcheck]
        text: "^QF"                    # test files: QF style suggestions suppressed
      - text: "Statuser"
        linters: [misspell]
      - text: "`strat`"
        linters: [misspell]          # strat は strategy の略（false positive）
      - text: 'Error return value of.*[.]Close.*is not checked'
        linters: [errcheck]          # defer Close() エラーは安全に無視
issues:
  # これらは v2 でも有効なまま
  max-issues-per-linter: 0
  max-same-issues: 0
